name: Downgrade Sublibraries
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  downgrade-sublibraries:
    uses: "SciML/.github/.github/workflows/sublibrary-downgrade.yml@v1"
    secrets: "inherit"
    with:
      julia-version: "lts"
      # SymbolicAnalysis skipped: 0.3.x doesn't support Symbolics 7 (required by
      # ModelingToolkit 11). QuadDIRECT skipped: it is unregistered, so the
      # downgrade resolver cannot look up its versions. Stdlibs and in-repo
      # sublibraries are auto-populated by the centralized workflow.
      skip: "SymbolicAnalysis,QuadDIRECT"
      group-env-name: "OPTIMIZATION_TEST_GROUP"
      group-env-value: "Core"
      # Every lib/* sublibrary is downgrade-tested (projects auto-discovered, no exclusions).
